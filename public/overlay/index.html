<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: transparent;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
    }

    /* Fullscreen clip host sits behind the 3x3 grid so that
       positioned items (alerts, !so clips) always appear on top. */
    #fullscreen-host {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    #fullscreen-host video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
    }

    /* 3x3 grid covering the whole viewport.
       Each cell is a positioning slot (1..9) for overlay media. */
    #grid {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      pointer-events: none;
      z-index: 10;
    }

    .slot {
      position: relative;
      display: flex;
      padding: 24px;
    }

    /* Slots 1..9 correspond to the 3x3 layout, left→right, top→bottom.
       Text anchors to the nearest corner/edge of the slot. */
    .slot[data-pos="1"] { align-items: flex-start;   justify-content: flex-start; }
    .slot[data-pos="2"] { align-items: flex-start;   justify-content: center;     }
    .slot[data-pos="3"] { align-items: flex-start;   justify-content: flex-end;   }
    .slot[data-pos="4"] { align-items: center;       justify-content: flex-start; }
    .slot[data-pos="5"] { align-items: center;       justify-content: center;     }
    .slot[data-pos="6"] { align-items: center;       justify-content: flex-end;   }
    .slot[data-pos="7"] { align-items: flex-end;     justify-content: flex-start; }
    .slot[data-pos="8"] { align-items: flex-end;     justify-content: center;     }
    .slot[data-pos="9"] { align-items: flex-end;     justify-content: flex-end;   }

    .item {
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      animation: itemIn 0.35s ease forwards;
      pointer-events: none;
    }

    .item.out {
      animation: itemOut 0.35s ease forwards;
    }

    #grid .item img,
    #grid .item video {
      display: block;
      max-width: 30vw;
      max-height: 30vh;
      border-radius: 8px;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.45));
    }

    /* Text alert box (only used by 'alert' events) */
    .alert-box {
      background: rgba(0, 0, 0, 0.85);
      padding: 20px 40px;
      border-radius: 12px;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      border: 2px solid rgba(255, 255, 255, 0.15);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      max-width: 80vw;
    }

    .alert-box .sub {
      font-size: 18px;
      font-weight: normal;
      opacity: 0.8;
      margin-top: 6px;
    }

    @keyframes itemIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes itemOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(-10px) scale(0.95); }
    }

    /* Connection status indicator */
    #status {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e74c3c;
      transition: background 0.3s;
      z-index: 9999;
    }

    #status.connected {
      background: #2ecc71;
    }
  </style>
</head>
<body>
  <div id="status"></div>
  <div id="fullscreen-host"></div>
  <div id="grid">
    <div class="slot" data-pos="1"></div>
    <div class="slot" data-pos="2"></div>
    <div class="slot" data-pos="3"></div>
    <div class="slot" data-pos="4"></div>
    <div class="slot" data-pos="5"></div>
    <div class="slot" data-pos="6"></div>
    <div class="slot" data-pos="7"></div>
    <div class="slot" data-pos="8"></div>
    <div class="slot" data-pos="9"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const ROOM = params.get('room') || params.get('streamer');
    const DEFAULT_WS = 'wss://leksimus-ws.onrender.com/overlay';
    const WS_URL = params.get('ws') || (ROOM ? `${DEFAULT_WS}?room=${encodeURIComponent(ROOM)}` : DEFAULT_WS);
    const WORKER_BASE = location.origin;
    const DEFAULT_DURATION_MS = 5000;
    const MIN_DURATION_MS = 1000;
    const MAX_DURATION_MS = 600000;

    if (!ROOM) {
      console.warn('[overlay] no room specified — add ?room=<token> to the URL');
    }

    let ws;
    let reconnectDelay = 1000;

    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log('[overlay] connected, subscribing to room:', ROOM);
        document.getElementById('status').classList.add('connected');
        reconnectDelay = 1000;
        if (ROOM) {
          ws.send(JSON.stringify({ type: 'subscribe', room: ROOM }));
        }
      };

      ws.onclose = () => {
        console.log('[overlay] disconnected, reconnecting in', reconnectDelay, 'ms');
        document.getElementById('status').classList.remove('connected');
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      };

      ws.onerror = (err) => {
        console.error('[overlay] ws error', err);
        ws.close();
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          console.log('[overlay] event received', data);
          handleEvent(data);
        } catch (e) {
          console.warn('[overlay] invalid message', event.data);
        }
      };
    }

    function handleEvent(data) {
      // Expected payloads (duration is in SECONDS from the bot):
      //   { type: 'alert', text, sub, duration, position }
      //   { type: 'image', src, position, duration, loop, width, height }
      //   { type: 'video', src, position, duration, loop, width, height, volume }
      //   { type: 'sound', src, duration }
      //   { type: 'fullscreen_clip', src, volume }
      switch (data.type) {
        case 'alert':
          showAlert(data);
          break;
        case 'image':
          showImage(data);
          break;
        case 'video':
          showVideo(data);
          break;
        case 'sound':
          playSound(data);
          break;
        case 'fullscreen_clip':
          showFullscreenClip(data);
          break;
        case 'subscribed':
          // Server ACK tras suscribirse a un room: no requiere render.
          console.log('[overlay] subscription ACK room=', data.room);
          break;
        default:
          console.log('[overlay] unknown event type:', data.type);
      }
    }

    const DIMENSION_REGEX = /^\d+(\.\d+)?(px|vw|vh|%|em|rem)$/i;
    function sanitizeDimension(value) {
      if (typeof value !== 'string') return '';
      const trimmed = value.trim().toLowerCase();
      return DIMENSION_REGEX.test(trimmed) ? trimmed : '';
    }

    function applyDimensions(element, data) {
      const width = sanitizeDimension(data?.width);
      const height = sanitizeDimension(data?.height);
      if (width) {
        element.style.width = width;
        element.style.maxWidth = 'none';
      }
      if (height) {
        element.style.height = height;
        element.style.maxHeight = 'none';
      }
    }

    function assetUrl(src) {
      if (!src) return '';
      if (/^https?:\/\//i.test(src)) return src;
      return WORKER_BASE + (src.startsWith('/') ? src : `/${src}`);
    }

    function resolveDurationMs(rawDurationSecs, fallbackMs = DEFAULT_DURATION_MS) {
      const secs = Number(rawDurationSecs);
      if (!Number.isFinite(secs) || secs <= 0) return fallbackMs;
      const ms = Math.round(secs * 1000);
      return Math.max(MIN_DURATION_MS, Math.min(MAX_DURATION_MS, ms));
    }

    function resolveVolume(rawVolume, fallback = 1.0) {
      const volume = Number(rawVolume);
      if (!Number.isFinite(volume)) return fallback;
      return Math.max(0, Math.min(1, volume));
    }

    function attemptMediaPlay(media, label, options = {}) {
      const allowMutedFallback = options.allowMutedFallback !== false;
      const playPromise = media.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch((err) => {
          if (!allowMutedFallback) {
            console.warn(`[overlay] ${label}.play() failed:`, err?.message || err);
            return;
          }
          console.warn(`[overlay] ${label}.play() rejected, retrying muted:`, err?.message || err);
          media.muted = true;
          media.play().catch((err2) => {
            console.warn(`[overlay] ${label}.play() still failing muted:`, err2?.message || err2);
          });
        });
      }
    }

    function resolveSlot(position) {
      const pos = Number(position);
      if (!Number.isInteger(pos) || pos < 1 || pos > 9) {
        return document.querySelector('.slot[data-pos="5"]');
      }
      return document.querySelector(`.slot[data-pos="${pos}"]`);
    }

    function mountItem(slot, content, durationMs) {
      const item = document.createElement('div');
      item.className = 'item';
      item.appendChild(content);
      slot.appendChild(item);

      setTimeout(() => {
        item.classList.add('out');
        item.addEventListener('animationend', () => item.remove(), { once: true });
      }, durationMs);

      return item;
    }

    function showAlert(data) {
      const slot = resolveSlot(data.position);
      const box = document.createElement('div');
      box.className = 'alert-box';
      if (data.text) box.innerHTML = data.text;
      if (data.sub) box.innerHTML += `<div class="sub">${data.sub}</div>`;
      mountItem(slot, box, resolveDurationMs(data.duration));
    }

    function showImage(data) {
      const slot = resolveSlot(data.position);
      const img = document.createElement('img');
      img.src = assetUrl(data.src);
      img.alt = '';
      applyDimensions(img, data);
      mountItem(slot, img, resolveDurationMs(data.duration));
    }

    function mountItemUntilEnded(slot, content) {
      const item = document.createElement('div');
      item.className = 'item';
      item.appendChild(content);
      slot.appendChild(item);
      return item;
    }

    function showVideo(data) {
      const slot = resolveSlot(data.position);
      const video = document.createElement('video');
      video.src = assetUrl(data.src);
      video.preload = 'auto';
      video.autoplay = true;
      video.playsInline = true;
      video.loop = Boolean(data.loop);
      video.volume = resolveVolume(data.volume);
      video.muted = false;
      applyDimensions(video, data);

      // duration=0 (or missing) = play until the video ends naturally.
      // Useful for clips whose exact length we don't know upfront.
      const rawDuration = Number(data.duration);
      const playNatural = !video.loop && (!Number.isFinite(rawDuration) || rawDuration <= 0);

      console.log('[overlay] showVideo', { src: video.src, position: data.position, duration: rawDuration, playNatural });

      let item;
      if (playNatural) {
        item = mountItemUntilEnded(slot, video);
      } else {
        item = mountItem(slot, video, resolveDurationMs(data.duration));
      }

      video.addEventListener('loadedmetadata', () => {
        console.log('[overlay] video loadedmetadata', { duration: video.duration, videoWidth: video.videoWidth });
      });
      video.addEventListener('canplay', () => {
        console.log('[overlay] video canplay');
      });

      attemptMediaPlay(video, 'video');

      if (!video.loop) {
        const closeNow = (reason) => {
          console.log('[overlay] video close', reason);
          if (!item.isConnected) return;
          item.classList.add('out');
          item.addEventListener('animationend', () => item.remove(), { once: true });
        };
        video.onended = () => closeNow('ended');
        video.onerror = (e) => {
          const err = video.error;
          console.warn('[overlay] video error', err && { code: err.code, message: err.message });
          closeNow('error');
        };
      }
    }

    const MAX_FULLSCREEN_CLIP_QUEUE = 5;
    const fullscreenClipQueue = [];
    let fullscreenCurrent = null;
    let fullscreenProcessing = false;

    function logFullscreenQueueState(reason, extra = {}) {
      console.log('[overlay] fullscreen clip queue', {
        reason,
        current: Boolean(fullscreenCurrent),
        pending: fullscreenClipQueue.length,
        maxPending: MAX_FULLSCREEN_CLIP_QUEUE,
        ...extra,
      });
    }

    function showFullscreenClip(data) {
      if (fullscreenClipQueue.length >= MAX_FULLSCREEN_CLIP_QUEUE) {
        const dropped = fullscreenClipQueue.shift();
        logFullscreenQueueState('drop-oldest-pending', {
          droppedSrc: assetUrl(dropped?.src),
          nextSrc: assetUrl(data?.src),
        });
      }

      fullscreenClipQueue.push(data);
      logFullscreenQueueState('queued', {
        src: assetUrl(data?.src),
      });
      processFullscreenClipQueue();
    }

    function processFullscreenClipQueue() {
      if (fullscreenProcessing || fullscreenCurrent || fullscreenClipQueue.length === 0) {
        return;
      }

      fullscreenProcessing = true;
      const data = fullscreenClipQueue.shift();
      logFullscreenQueueState('starting', {
        src: assetUrl(data?.src),
      });
      const host = document.getElementById('fullscreen-host');
      if (!host) {
        fullscreenProcessing = false;
        logFullscreenQueueState('host-missing');
        return;
      }

      const video = document.createElement('video');
      video.src = assetUrl(data.src);
      video.preload = 'auto';
      video.autoplay = true;
      video.playsInline = true;
      video.loop = false;
      video.volume = resolveVolume(data.volume);
      video.muted = false;

      const wrapper = document.createElement('div');
      wrapper.className = 'item';
      wrapper.style.width = '100%';
      wrapper.style.height = '100%';
      wrapper.appendChild(video);
      host.appendChild(wrapper);
      fullscreenCurrent = wrapper;

      video.addEventListener('loadedmetadata', () => {
        console.log('[overlay] fullscreen clip loadedmetadata', { src: video.src, duration: video.duration });
      });
      video.addEventListener('canplay', () => {
        console.log('[overlay] fullscreen clip canplay');
      });

      const closeNow = () => {
        if (!wrapper.isConnected) return;
        wrapper.classList.add('out');
        wrapper.addEventListener('animationend', () => {
          wrapper.remove();
          if (fullscreenCurrent === wrapper) {
            fullscreenCurrent = null;
            fullscreenProcessing = false;
            logFullscreenQueueState('finished', {
              src: assetUrl(data?.src),
            });
            processFullscreenClipQueue();
          }
        }, { once: true });
      };
      video.onended = closeNow;
      video.onerror = closeNow;
      attemptMediaPlay(video, 'fullscreen clip');
    }

    function playSound(data) {
      const audio = new Audio(assetUrl(data.src));
      audio.volume = resolveVolume(data.volume);
      audio.muted = false;
      attemptMediaPlay(audio, 'audio', { allowMutedFallback: false });

      const durationMs = resolveDurationMs(data.duration, 0);
      if (durationMs > 0) {
        setTimeout(() => {
          try { audio.pause(); audio.currentTime = 0; } catch (_) {}
        }, durationMs);
      }
    }

    connect();
  </script>
</body>
</html>
