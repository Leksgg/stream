name = "streams"
main = "src/worker.js"
compatibility_date = "2024-09-25"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
